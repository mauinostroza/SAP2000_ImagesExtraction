name: Build Portable EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-portable-exe.yml"
      - "sap_imagenes.py"
      - "sap2000_gui.py"
      - "sap2000_portable.spec"
      - "sap2000_ci.spec"
      - "requirements-exe.txt"
      - "build_exe.bat"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-exe.txt

      - name: Install dependencies
        run: pip install -r requirements-exe.txt

      - name: Build EXE (CI variant)
        shell: pwsh
        run: python -m PyInstaller --clean sap2000_ci.spec

      - name: Excluir dist de Windows Defender
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}\dist"

      - name: Smoke test — verificar que el .exe genera el Excel
        shell: pwsh
        env:
          SAP2000_SUPPRESS_POPUPS: "1"
        run: |
          $excelPath = "$env:RUNNER_TEMP\SAP2000_Capturas_smoke.xlsx"
          $proc = Start-Process -FilePath ".\dist\sap2000_capture.exe" -ArgumentList "--crear-excel", $excelPath -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            throw "El EXE termino con codigo de salida $($proc.ExitCode)"
          }
          if (!(Test-Path $excelPath)) {
            throw "No se genero el Excel desde el EXE"
          }

      - name: Empaquetar artifact (solo .exe + docs + Excel)
        shell: pwsh
        run: |
          $zipName = "sap2000_capture_windows.zip"
          $files = @(
            "dist\sap2000_capture.exe",
            "README.md"
          )
          # Incluir el Excel de config si existe
          if (Test-Path "SAP2000_Capturas.xlsx") {
            $files += "SAP2000_Capturas.xlsx"
          } elseif (Test-Path "SAP2000_Capturas.xlsm") {
            $files += "SAP2000_Capturas.xlsm"
          }
          Compress-Archive -Path $files -DestinationPath $zipName -Force
          Write-Host "ZIP creado: $zipName"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sap2000-capture-windows
          path: |
            sap2000_capture_windows.zip
            dist/sap2000_capture.exe
          if-no-files-found: error
